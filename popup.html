<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: system-ui, sans-serif; padding: 15px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    textarea { width: 100%; height: 120px; margin-bottom: 10px; resize: none; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    .status { font-size: 12px; color: #666; margin-top: 8px; text-align: center; font-style: italic; }
  </style>
</head>
<body>
  <h3>AI CV Form Filler</h3>
  <textarea id="cvText" placeholder="Paste your raw CV text here for context..."></textarea>
  <button id="testBtn">Test Connection</button>
  <div id="status" class="status">Ready.</div>

  <script src="popup.js"></script>
</body>
</html>
